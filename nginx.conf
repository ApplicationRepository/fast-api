worker_processes auto;
pid /tmp/nginx.pid; # 避免非 root 用户无权限写入 /var/run

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # 💡 核心新增：设置全局默认编码为 UTF-8
    charset utf-8;

    # 💡 性能优化与非 root 兼容性配置
    sendfile on;
    keepalive_timeout 65;

    # 避免非 root 用户因无权写入默认的 /var/cache/nginx/ 导致启动失败
    client_body_temp_path /tmp/client_temp;
    proxy_temp_path       /tmp/proxy_temp;
    fastcgi_temp_path     /tmp/fastcgi_temp;
    uwsgi_temp_path       /tmp/uwsgi_temp;
    scgi_temp_path        /tmp/scgi_temp;

    server {
        listen 80;

        # 1. 虚拟路径映射：直接挂载宿主机图片目录到 nginx 容器内
        location /file/ {
            alias /workspace/file/;
            autoindex on; # 可选：允许列出目录（调试用，生产环境可关闭）
            expires 30d;  # 缓存 30 天
            add_header Cache-Control "public, no-transform";

            # 💡 针对文件列表页面，确保中文文件名在浏览器中不乱码
            charset utf-8;
        }

        # 2. 反向代理：通过服务名 backend 转发给后台容器
        location /api/ {
            proxy_pass http://backend:8000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 支持 WebSocket (如果你的 AI Agent 或服务需要)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # 3. 前端静态托管
        location / {
            root /workspace/dist;
            index index.html index.htm;
            try_files $uri $uri/ /index.html; # 支持 Vue/React 的 History 路由模式
        }
    }
}
