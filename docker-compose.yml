services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # 💡 修改：使用更安全的变量名，规避只读限制
        - USER_ID=${CURRENT_UID:-1000}
        - GROUP_ID=${CURRENT_GID:-1000}
    restart: unless-stopped
    image: ${APP_BACKEND_IMAGE_NAME}:${APP_BACKEND_IMAGE_VERSION}
    container_name: ${APP_BACKEND_CONTAINER_NAME}-${APP_BACKEND_CONTAINER_VERSION}
    volumes:
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    environment:
      - ENV=production
      - TZ=Asia/Shanghai
    extra_hosts:
      - "aa.bb.cc:1.2.3.4"
    networks:
      - fast_api_backend_network

  frontend:
    image: nginx:alpine
    container_name: ${APP_FRONTEND_CONTAINER_NAME}-${APP_FRONTEND_CONTAINER_VERSION}
    restart: unless-stopped
    ports:
      - "8123:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./file:/workspace/file
      - ./dist:/usr/share/nginx/html
    depends_on:
      - backend
    networks:
      - fast_api_frontend_network
      - fast_api_backend_network

networks:
  fast_api_backend_network:
    name: fast_api_backend_network
    driver: bridge
  fast_api_frontend_network:
    name: fast_api_frontend_network
    driver: bridge
